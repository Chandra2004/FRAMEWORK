# .github/workflows/deploy.yml
name: Deploy to InfinityFree

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  web-deploy:
    name: 🎉 GACOR DEPLOY
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚡ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, intl, pdo, pdo_mysql
          coverage: none

      - name: 📦 Install Dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

      - name: 🔐 Prepare Configuration
        id: config
        run: |
          # Buat file .env murni dari GitHub Secrets
          echo "${{ secrets.INTI_ENV }}" > .env
          echo "" >> .env
          echo "${{ secrets.INTI_DATABASE }}" >> .env
          
          # Pecah INTI_FTP menjadi output step
          echo "${{ secrets.INTI_FTP }}" > ftp_raw
          echo "ftp_server=$(sed -n '1p' ftp_raw)" >> $GITHUB_OUTPUT
          echo "ftp_username=$(sed -n '2p' ftp_raw)" >> $GITHUB_OUTPUT
          echo "ftp_password=$(sed -n '3p' ftp_raw)" >> $GITHUB_OUTPUT

      - name: 🚀 Publish Assets
        run: php artisan asset:publish

      - name: 📤 Sync files to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.config.outputs.ftp_server }}
          username: ${{ steps.config.outputs.ftp_username }}
          password: ${{ steps.config.outputs.ftp_password }}
          server-dir: chandra-portfolio.rf.gd/htdocs/
          timeout: 3600000
          # KUNCINYA: Exclude semua folder cache & session agar tidak terjadi konflik config di production
          exclude: |
            **/.git*
            **/.github/**
            **/.idx/**
            **/.cursorrules
            **/tests/**
            **/node_modules/**
            **/docs/**
            **/phpunit.xml
            **/.env.example
            **/README.md
            storage/logs/**
            storage/cache/**
            storage/framework/cache/**
            storage/framework/views/**
            storage/session/**
