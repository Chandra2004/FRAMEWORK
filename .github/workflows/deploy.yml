# .github/workflows/deploy.yml
# THE FRAMEWORK - Optimized Deployment for InfinityFree (iFastNet)
name: Deploy to InfinityFree

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  web-deploy:
    name: 🎉 GACOR DEPLOY
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚡ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, intl, pdo, pdo_mysql, dom, xml, curl
          coverage: none

      - name: 📦 Install Dependencies
        # Menggunakan --optimize-autoloader sangat krusial untuk performa di hosting gratis
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

      - name: 🔐 Prepare Configuration
        id: config
        run: |
          # Membangun file .env murni dari GitHub Secrets
          echo "${{ secrets.INTI_ENV }}" > .env
          echo "" >> .env
          echo "${{ secrets.INTI_DATABASE }}" >> .env
          
          # Memisahkan INTI_FTP (Host\nUser\nPass) menjadi output langkah
          echo "${{ secrets.INTI_FTP }}" > ftp_raw
          echo "ftp_server=$(sed -n '1p' ftp_raw)" >> $GITHUB_OUTPUT
          echo "ftp_username=$(sed -n '2p' ftp_raw)" >> $GITHUB_OUTPUT
          echo "ftp_password=$(sed -n '3p' ftp_raw)" >> $GITHUB_OUTPUT

      - name: 🚀 Publish Assets
        run: php artisan asset:publish

      - name: 📤 Sync files to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ steps.config.outputs.ftp_server }}
          username: ${{ steps.config.outputs.ftp_username }}
          password: ${{ steps.config.outputs.ftp_password }}
          # Pastikan path ini sesuai dengan root domain Anda di cPanel
          server-dir: htdocs/
          timeout: 3600000
          # KUNCINYA: Exclude file sampah sistem, folder testing, dan folder cache agar tidak terjadi konflik
          exclude: |
            **/.git*
            **/.github/**
            **/.idx/**
            **/.vscode/**
            **/.cursorrules
            **/tests/**
            **/node_modules/**
            **/docs/**
            **/phpunit.xml
            **/.env.example
            **/README.md
            **/CHANGELOG.md
            **/CONTRIBUTING.md
            **/LICENSE
            **/.DS_Store
            **/Thumbs.db
            private-uploads/**
            storage/app/public/**
            storage/logs/**
            storage/cache/**
            storage/framework/cache/**
            storage/framework/views/**
            storage/session/**
